# Render configuration for Admin Dashboard
services:
  - type: web
    name: sbb-medicare-admin-dashboard
    env: static
    region: oregon
    branch: main
    buildCommand: cd sbb-medicare-admin && npm install && npm run build
    staticPublishPath: sbb-medicare-admin/dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false  # Set in Render dashboard to your API URL
