version: "3.8"

services:
  postgres:
    image: postgres:17-alpine
    container_name: pharmapay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./platform/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./platform/database/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  platform-api:
    build:
      context: ./platform
      dockerfile: Dockerfile
    container_name: pharmapay-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_SSL: "false"
    volumes:
      - uploads:/app/uploads
      - ./tenant-configs:/app/tenant-configs:ro

  platform-nginx:
    image: nginx:alpine
    container_name: pharmapay-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - platform-api
    volumes:
      - ./nginx/pharmapay.conf:/etc/nginx/nginx.conf:ro
      - ./admin-dashboard/dist:/usr/share/nginx/admin:ro
      - ./store-dashboard/dist:/usr/share/nginx/store:ro
      - uploads:/usr/share/nginx/uploads:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  pgdata:
  uploads:
