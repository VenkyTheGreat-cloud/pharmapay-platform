services:
  # 1. THE BACKEND API
  - type: web
    name: sbb-medicare-api
    runtime: node
    plan: starter
    region: oregon
    rootDir: sbb-medicare-backend
    buildCommand: npm install && npm run build --if-present
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sbb-medicare-db
          property: connectionString
      - key: NODE_VERSION
        value: "18"

  # 2. THE ADMIN PANEL
  - type: web
    name: sbb-medicare-admin
    runtime: static
    rootDir: sbb-medicare-admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist # Correct field for static sites in blueprints

  # 3. THE STOREFRONT (Nested)
  - type: web
    name: sbb-medicare-store
    runtime: static
    # Path is relative to repo root
    rootDir: sbb-medicare-admin/sbb-medicare-store 
    buildCommand: npm install && npm run build
    staticPublishPath: dist # Correct field for static sites in blueprints

# Keep this at the very bottom
databases:
  - name: sbb-medicare-db
    databaseName: sbb_medicare
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "17"
