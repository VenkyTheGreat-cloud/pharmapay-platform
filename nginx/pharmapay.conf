worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;

    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Upstreams
    upstream platform_api {
        server platform-api:5000;
    }

    upstream admin_dashboard {
        server admin-dashboard:80;
    }

    upstream store_dashboard {
        server store-dashboard:80;
    }

    upstream onboarding_portal {
        server onboarding-portal:80;
    }

    # SSL settings (shared)
    ssl_certificate     /etc/letsencrypt/live/pharmapay.swinkpay-fintech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pharmapay.swinkpay-fintech.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Extract tenant slug from subdomain:
    #   {slug}.pharmapay.swinkpay-fintech.com → $tenant_slug = {slug}
    map $host $tenant_slug {
        default "";
        "~^(?<slug>[^.]+)\.pharmapay\.swinkpay-fintech\.com$" $slug;
    }

    # =============================================
    # HTTP → HTTPS redirect (all hosts)
    # =============================================
    server {
        listen 80;
        server_name pharmapay.swinkpay-fintech.com
                    *.pharmapay.swinkpay-fintech.com;
        return 301 https://$host$request_uri;
    }

    # =============================================
    # Builder Portal — pharmapay.swinkpay-fintech.com
    # Pharmacy owners sign up and configure here
    # =============================================
    server {
        listen 443 ssl;
        server_name pharmapay.swinkpay-fintech.com;

        client_max_body_size 10m;

        # API proxy for builder portal
        location /api/ {
            limit_req zone=api burst=60 nodelay;

            proxy_pass http://platform_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Uploads (for logo previews etc.)
        location /uploads/ {
            alias /usr/share/nginx/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Builder portal SPA
        location / {
            proxy_pass http://onboarding_portal;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # =============================================
    # Tenant — {slug}.pharmapay.swinkpay-fintech.com
    # Routes: /api, /admin, /uploads, /health, / (store)
    # =============================================
    server {
        listen 443 ssl;
        server_name "~^(?<slug>[^.]+)\.pharmapay\.swinkpay-fintech\.com$";

        client_max_body_size 10m;

        # API — /api/*
        location /api/ {
            limit_req zone=api burst=60 nodelay;

            proxy_pass http://platform_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Tenant-Slug $slug;

            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Admin dashboard — /admin/*
        location /admin/ {
            rewrite ^/admin/(.*) /$1 break;
            proxy_pass http://admin_dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /admin {
            return 301 $scheme://$host/admin/;
        }

        # Uploads
        location /uploads/ {
            alias /usr/share/nginx/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Health check
        location /health {
            proxy_pass http://platform_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Tenant-Slug $slug;
        }

        # Store dashboard — / (default)
        location / {
            proxy_pass http://store_dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # =============================================
    # Fallback — reject unknown hosts
    # =============================================
    server {
        listen 443 ssl default_server;
        server_name _;
        return 444;
    }
}
