services:
  - type: web
    name: sbb-medicare-api
    runtime: node
    plan: starter
    region: oregon
    rootDir: sbb-medicare-backend
    # Safe Command: Tries to build, but won't fail if the script is missing
    buildCommand: npm install && npm run build --if-present
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sbb-medicare-db
          property: connectionString
      - key: NODE_VERSION
        value: "18"

databases:
  - name: sbb-medicare-db
    databaseName: sbb_medicare
    plan: basic-256mb  # This is the modern equivalent of the $7 plan
    region: oregon
    postgresMajorVersion: "17"
