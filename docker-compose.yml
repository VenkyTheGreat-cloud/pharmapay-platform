services:
  postgres:
    image: postgres:17-alpine
    container_name: pharmapay-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./platform/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./platform/database/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  platform-api:
    build:
      context: ./platform
      dockerfile: Dockerfile
    container_name: pharmapay-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - platform/.env.production
    environment:
      - "SWINKPAY_AUTH_TOKEN=FREFA45D$$B2#18842765#992"
    volumes:
      - uploads:/app/uploads
      - ./tenant-configs:/app/tenant-configs

  admin-dashboard:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
    container_name: pharmapay-admin
    restart: unless-stopped

  store-dashboard:
    build:
      context: ./store-dashboard
      dockerfile: Dockerfile
    container_name: pharmapay-store
    restart: unless-stopped

  onboarding-portal:
    image: nginx:alpine
    container_name: pharmapay-onboarding
    restart: unless-stopped
    volumes:
      - ./swinkpaypharma-dist:/usr/share/nginx/html:ro
      - ./mobile-app/nginx-pwa.conf:/etc/nginx/conf.d/default.conf:ro

  platform-nginx:
    image: nginx:alpine
    container_name: pharmapay-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - platform-api
      - admin-dashboard
      - store-dashboard
      - onboarding-portal
    volumes:
      - ./nginx/pharmapay.conf:/etc/nginx/nginx.conf:ro
      - uploads:/usr/share/nginx/uploads:ro
      - /etc/letsencrypt/live/pharmagig.swinkpay-fintech.com:/etc/letsencrypt/live/pharmagig.swinkpay-fintech.com:ro
      - /etc/letsencrypt/archive/pharmagig.swinkpay-fintech.com:/etc/letsencrypt/archive/pharmagig.swinkpay-fintech.com:ro

volumes:
  pgdata:
  uploads:
