# Render configuration for Backend API
services:
  - type: web
    name: sbb-medicare-api
    env: node
    region: oregon
    plan: starter
    branch: main
    buildCommand: ./render-build.sh
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MAX_FILE_SIZE
        value: 5242880
      - key: UPLOAD_PATH
        value: ./uploads
      - key: ALLOWED_ORIGINS
        sync: false  # Set manually in Render dashboard
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1

databases:
  - name: sbb-medicare-db
    databaseName: sbb_medicare
    user: sbb_medicare_user
    plan: starter
