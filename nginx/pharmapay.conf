worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;

    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Upstream — platform API (only backend that runs as a process)
    upstream platform_api {
        server platform-api:5000;
    }

    # SSL settings (shared)
    ssl_certificate     /etc/letsencrypt/live/pharmapay.swinkpay-fintech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pharmapay.swinkpay-fintech.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Extract tenant slug from subdomain pattern:
    #   api.SLUG.pharmapay.swinkpay-fintech.com   → $tenant_slug = SLUG
    #   admin.SLUG.pharmapay.swinkpay-fintech.com  → $tenant_slug = SLUG
    #   store.SLUG.pharmapay.swinkpay-fintech.com  → $tenant_slug = SLUG
    map $host $tenant_slug {
        default "";
        "~^(?:api|admin|store)\.(?<slug>[^.]+)\.pharmapay\.swinkpay-fintech\.com$" $slug;
    }

    # =============================================
    # HTTP → HTTPS redirect (all hosts)
    # =============================================
    server {
        listen 80;
        server_name pharmapay.swinkpay-fintech.com
                    *.pharmapay.swinkpay-fintech.com;
        return 301 https://$host$request_uri;
    }

    # =============================================
    # Landing page — pharmapay.swinkpay-fintech.com
    # (placeholder until builder portal is built)
    # =============================================
    server {
        listen 443 ssl;
        server_name pharmapay.swinkpay-fintech.com;

        client_max_body_size 10m;

        # For now, serve admin dashboard as landing page
        location / {
            root /usr/share/nginx/admin;
            try_files $uri $uri/ /index.html;

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }

    # =============================================
    # Platform API — api.{slug}.pharmapay.swinkpay-fintech.com
    # =============================================
    server {
        listen 443 ssl;
        server_name "~^api\.(?<slug>[^.]+)\.pharmapay\.swinkpay-fintech\.com$";

        client_max_body_size 10m;

        location / {
            limit_req zone=api burst=60 nodelay;

            proxy_pass http://platform_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Tenant-Slug $slug;

            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        location /uploads/ {
            alias /usr/share/nginx/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /health {
            proxy_pass http://platform_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Tenant-Slug $slug;
        }
    }

    # =============================================
    # Admin Dashboard — admin.{slug}.pharmapay.swinkpay-fintech.com
    # Serves pre-built static files from admin-dashboard/dist
    # =============================================
    server {
        listen 443 ssl;
        server_name "~^admin\.(?<slug>[^.]+)\.pharmapay\.swinkpay-fintech\.com$";

        client_max_body_size 10m;

        # API proxy — forwards /api/* to backend with tenant slug
        location /api/ {
            limit_req zone=api burst=60 nodelay;

            proxy_pass http://platform_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Tenant-Slug $slug;

            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        location /uploads/ {
            alias /usr/share/nginx/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Static SPA
        location / {
            root /usr/share/nginx/admin;
            try_files $uri $uri/ /index.html;

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }

    # =============================================
    # Store Dashboard — store.{slug}.pharmapay.swinkpay-fintech.com
    # Serves pre-built static files from store-dashboard/dist
    # =============================================
    server {
        listen 443 ssl;
        server_name "~^store\.(?<slug>[^.]+)\.pharmapay\.swinkpay-fintech\.com$";

        client_max_body_size 10m;

        # API proxy
        location /api/ {
            limit_req zone=api burst=60 nodelay;

            proxy_pass http://platform_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Tenant-Slug $slug;

            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        location /uploads/ {
            alias /usr/share/nginx/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Static SPA
        location / {
            root /usr/share/nginx/store;
            try_files $uri $uri/ /index.html;

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }

    # =============================================
    # Fallback — reject unknown hosts
    # =============================================
    server {
        listen 443 ssl default_server;
        server_name _;
        return 444;
    }
}
